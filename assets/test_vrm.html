<!DOCTYPE html><html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VRM Test</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e17;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:system-ui,sans-serif}
#container{width:480px;height:640px;border-radius:16px;overflow:hidden;border:1px solid rgba(0,230,255,0.3)}
#info{color:rgba(0,230,255,0.6);margin-top:10px;font-size:13px}
#actions{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
#actions button{background:rgba(0,230,255,0.1);border:1px solid rgba(0,230,255,0.3);color:#00e6ff;padding:6px 16px;border-radius:6px;cursor:pointer;font-size:12px}
#actions button:hover{background:rgba(0,230,255,0.2)}
#actions button.active{background:rgba(0,230,255,0.3);border-color:#00e6ff}
#status{color:rgba(0,230,255,0.8);margin-top:8px;font-size:12px}
</style>
</head>
<body>
<div id="container"></div>
<div id="info">JARVIS · 3D VRM (drag to rotate, scroll to zoom)</div>
<div id="actions"></div>
<div id="status">Loading Three.js...</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const container = document.getElementById('container');
const statusEl = document.getElementById('status');
const actionsEl = document.getElementById('actions');

const w = container.clientWidth || 480;
const h = container.clientHeight || 640;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0e17);

const camera = new THREE.PerspectiveCamera(40, w / h, 0.01, 100);
camera.position.set(2, 1.5, 3);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(w, h);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.domElement.style.width = '100%'; renderer.domElement.style.height = '100%';
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.update();

const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(2, 4, 3);
scene.add(dirLight);
const rimLight = new THREE.DirectionalLight(0x4488ff, 0.5);
rimLight.position.set(-2, 1, -3);
scene.add(rimLight);

const grid = new THREE.GridHelper(10, 10, 0x00e6ff, 0x003344);
scene.add(grid);

let model, mixer, clock = new THREE.Clock();
const animClips = {};
let currentAction = null;
let isReady = false;
let talkingClip = null;

function setActive(id) {
  document.querySelectorAll('#actions button').forEach(b => b.classList.toggle('active', b.dataset.action === id));
}

function playAction(name) {
  if (!mixer) return;
  mixer.stopAllAction();
  const animName = name === 'lie_down' ? 'Human Armature|Death' :
                   name === 'talking' ? 'talking' :
                   name === 'idle' ? 'Human Armature|Idle' :
                   name === 'walk' ? 'Human Armature|Walk' : name;
  const clip = animClips[animName];
  if (!clip) { statusEl.textContent = 'Not found: ' + animName; return; }
  const next = mixer.clipAction(clip);
  next.reset().play();
  currentAction = next;
  setActive(name);
  statusEl.textContent = name;
}

const MODEL_ANIMS = {
  idle: 'Human Armature|Idle',
  walk: 'Human Armature|Walk',
};

// Build procedural talking clip
function createTalkingClip(model) {
  const headNames = ['Head', 'Neck', 'Spine1'];
  const bones = [];
  model.traverse(c => { if (c.isBone && headNames.includes(c.name)) bones.push(c); });
  if (!bones.length) return null;

  const dur = 2;
  const fps = 24;
  const frames = dur * fps;
  const times = [];
  for (let f = 0; f <= frames; f++) times.push(f / fps);

  const tracks = [];
  for (const bone of bones) {
    const values = [];
    for (let f = 0; f <= frames; f++) {
      const t = f / fps;
      const phase = t * 5 * Math.PI * 2;
      let rx = 0, ry = 0, rz = 0;
      if (bone.name === 'Head') {
        rx = Math.sin(phase) * 0.04;
        ry = Math.sin(phase * 1.3) * 0.03;
        rz = Math.cos(phase * 0.7) * 0.02;
      } else if (bone.name === 'Neck') {
        rx = Math.sin(phase * 0.8) * 0.02;
        ry = Math.sin(phase * 1.1) * 0.015;
      } else if (bone.name === 'Spine1') {
        ry = Math.sin(phase * 0.6) * 0.015;
      }
      const q = new THREE.Quaternion().setFromEuler(new THREE.Euler(rx, ry, rz));
      values.push(q.x, q.y, q.z, q.w);
    }
    tracks.push(new THREE.QuaternionKeyframeTrack(bone.name + '.quaternion', times, values));
  }
  return new THREE.AnimationClip('talking', dur, tracks);
}

statusEl.textContent = 'Loading GLB model...';
const loader = new GLTFLoader();
try {
  const gltf = await loader.loadAsync('/assets/models/jarvis_girl.glb');
  model = gltf.scene;
  scene.add(model);

  // Compute bbox for auto-framing
  const box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const dist = maxDim * 2.5;
  camera.position.set(dist * 0.5, dist * 0.3 + center.y, dist);
  controls.target.copy(center);
  controls.update();
  statusEl.textContent = `Loaded (${size.y.toFixed(3)}u tall)`;

  mixer = new THREE.AnimationMixer(model);
  gltf.animations.forEach(clip => { animClips[clip.name] = clip; });
  talkingClip = createTalkingClip(model);
  if (talkingClip) animClips.talking = talkingClip;
  console.log('[VRM] anims:', Object.keys(animClips));
  isReady = true;

  // Build buttons for all actions
  ['idle', 'walk', 'talking', 'lie_down'].forEach(n => {
    const btn = document.createElement('button');
    btn.textContent = n;
    btn.dataset.action = n;
    btn.onclick = () => playAction(n);
    actionsEl.appendChild(btn);
  });

  playAction('idle');
} catch (err) {
  statusEl.textContent = 'ERROR: ' + err.message;
}

renderer.setAnimationLoop(() => {
  if (mixer) mixer.update(clock.getDelta());
  controls.update();
  renderer.render(scene, camera);
});
</script>
</body>
</html>
